apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info-service.fullname" . }}
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
{{- if not (and .Values.rollout.enabled (eq .Values.rollout.strategy "blueGreen")) }}
  selector:
    {{- include "devops-info-service.selectorLabels" . | nindent 4 }}
{{- end }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
{{ if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
{{ end }}
