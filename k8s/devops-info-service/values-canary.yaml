# Lab 14 canary strategy values.
rollout:
  enabled: true
  strategy: canary
  canary:
    maxSurge: 1
    maxUnavailable: 0
    steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause:
          duration: 30s
      - setWeight: 60
      - pause:
          duration: 30s
      - setWeight: 80
      - pause:
          duration: 30s
      - setWeight: 100

env:
  appMessage: "Lab 14 canary progressive delivery"
  serviceVersion: "lab14-canary-v1"

hooks:
  postInstall:
    enabled: false
