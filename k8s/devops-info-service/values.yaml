nameOverride: ""
fullnameOverride: ""
component: web
partOf: devops-core-course
commonLabels: {}
podAnnotations: {}

replicaCount: 3
revisionHistoryLimit: 10

image:
  repository: dorley174/devops-info-service
  tag: "latest"
  pullPolicy: IfNotPresent

containerPort: 5000

strategy:
  maxSurge: 1
  maxUnavailable: 0

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

serviceAccount:
  create: true
  name: ""
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  port: "5000"
  debug: "False"
  appVariant: app1
  appMessage: "Lab 12 configmap and persistence deployment"
  serviceVersion: "lab12-v1"
  visitsFile: "/data/visits"

config:
  mountPath: "/config"
  fileName: "config.json"
  environment: "dev"
  logLevel: "INFO"
  featureFlags:
    visitsEndpoint: true
    persistentCounter: true

persistence:
  enabled: true
  mountPath: "/data"
  size: 100Mi
  storageClass: ""

secrets:
  enabled: true
  name: ""
  existingSecret: ""
  type: Opaque
  data:
    username: "change-me-username"
    password: "change-me-password"

vault:
  enabled: false
  role: "devops-info-service-role"
  authPath: "auth/kubernetes"
  service: ""
  secrets:
    appConfig:
      path: "secret/data/devops-info-service/config"
      mountPath: "/vault/secrets"
      fileName: "app-config.txt"

readinessProbe:
  path: /ready
  port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  path: /health
  port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

hooks:
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  preInstall:
    enabled: true
    weight: -5
    sleepSeconds: 3
  postInstall:
    enabled: true
    weight: 5
    sleepSeconds: 5
