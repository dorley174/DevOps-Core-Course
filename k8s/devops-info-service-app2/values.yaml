nameOverride: ""
fullnameOverride: ""
component: web
partOf: devops-core-course
commonLabels: {}

replicaCount: 2
revisionHistoryLimit: 10

image:
  repository: dorley174/devops-info-service
  tag: "latest"
  pullPolicy: IfNotPresent

containerPort: 5000

strategy:
  maxSurge: 1
  maxUnavailable: 0

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30081

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  port: "5000"
  debug: "False"
  appVariant: app2
  appMessage: "Lab 10 Helm bonus deployment"
  serviceVersion: "lab10-bonus"

readinessProbe:
  path: /ready
  port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  path: /health
  port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

hooks:
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  preInstall:
    enabled: true
    weight: -5
    sleepSeconds: 3
  postInstall:
    enabled: true
    weight: 5
    sleepSeconds: 5
