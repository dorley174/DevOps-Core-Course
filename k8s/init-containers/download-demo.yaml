apiVersion: v1
kind: Pod
metadata:
  name: init-download-demo
  labels:
    app: init-download-demo
spec:
  restartPolicy: Never
  initContainers:
    - name: init-download
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          wget -O /work-dir/index.html https://example.com
          echo "Download complete"
      volumeMounts:
        - name: workdir
          mountPath: /work-dir
  containers:
    - name: main-app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          echo "Main container started"
          sleep 3600
      volumeMounts:
        - name: workdir
          mountPath: /data
  volumes:
    - name: workdir
      emptyDir: {}
