---

# This role demonstrates advanced Ansible features (Lab06):
# - nested blocks
# - rescue/always error handling
# - tag strategy for selective execution

- name: Common role tasks
  block:
    # -----------------------------------------------------------------------
    # Packages
    # -----------------------------------------------------------------------
    - name: Install common packages
      block:
        - name: Update apt cache
          ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

        - name: Install common packages
          ansible.builtin.apt:
            name: "{{ common_packages }}"
            state: present

      rescue:
        # NOTE: If this rescue block fails too, Ansible will stop the play.
        # The outer 'always' section will still run.
        - name: Fix APT metadata issues (best-effort)  # noqa command-instead-of-module
          ansible.builtin.command: apt-get update --fix-missing
          changed_when: false

        - name: Retry apt cache update
          ansible.builtin.apt:
            update_cache: true
            cache_valid_time: 3600

      become: true
      tags:
        - packages

    # -----------------------------------------------------------------------
    # Users
    # -----------------------------------------------------------------------
    - name: Manage users (optional)
      block:
        - name: Ensure requested users exist
          ansible.builtin.user:
            name: "{{ item.name }}"
            groups: "{{ item.groups | default(omit) }}"
            shell: "{{ item.shell | default('/bin/bash') }}"
            create_home: true
            state: present
          loop: "{{ common_users }}"
          loop_control:
            label: "{{ item.name }}"

        - name: Configure passwordless sudo (optional)
          ansible.builtin.copy:
            dest: "/etc/sudoers.d/{{ item.name }}"
            content: "{{ item.name }} ALL=(ALL) NOPASSWD:ALL\n"
            mode: "0440"
            validate: "visudo -cf %s"
          when: item.sudo_nopasswd | default(false) | bool
          loop: "{{ common_users }}"
          loop_control:
            label: "{{ item.name }}"

        - name: Add SSH authorized keys (optional)
          ansible.posix.authorized_key:
            user: "{{ item.0.name }}"
            key: "{{ item.1 }}"
            state: present
          loop: "{{ common_users | subelements('authorized_keys', skip_missing=True) }}"
          loop_control:
            label: "{{ item.0.name }}"

      become: true
      tags:
        - users

    # -----------------------------------------------------------------------
    # Other system settings
    # -----------------------------------------------------------------------
    - name: Set timezone
      community.general.timezone:
        name: "{{ common_timezone }}"
      when: common_set_timezone | bool
      become: true

  always:
    # A simple completion marker that can be used as "evidence".
    - name: Log common role completion
      ansible.builtin.copy:
        dest: /tmp/ansible_common_role_completed.log
        content: "common role completed at {{ ansible_date_time.iso8601 }}\n"
        mode: "0644"
      become: true
      changed_when: false
      tags:
        - packages
        - users
