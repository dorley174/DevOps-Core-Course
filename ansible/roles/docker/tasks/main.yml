---

# Lab06: this role is refactored to use blocks, tags and error handling.
# Tags:
#   - docker         (role-level tag, set in playbooks)
#   - docker_install (installation only)
#   - docker_config  (configuration only)

- name: Docker role tasks
  block:
    # -----------------------------------------------------------------------
    # Installation
    # -----------------------------------------------------------------------
    - name: Install Docker Engine
      block:
        - name: Install prerequisites for Docker repository
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
              - gnupg
            state: present
            update_cache: true

        - name: Ensure /etc/apt/keyrings exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: Download Docker GPG key (ASCII)
          ansible.builtin.get_url:
            url: "{{ docker_gpg_key_url }}"
            dest: /tmp/docker.gpg
            mode: "0644"
          register: docker_gpg_download

        - name: Check if Docker keyring already exists
          ansible.builtin.stat:
            path: "{{ docker_keyring_path }}"
          register: docker_keyring_stat

        - name: Convert (dearmor) Docker GPG key to keyring
          ansible.builtin.command:
            cmd: "gpg --dearmor -o {{ docker_keyring_path }} /tmp/docker.gpg"
          when: docker_gpg_download.changed or (not docker_keyring_stat.stat.exists)
          changed_when: true
          notify: Restart Docker

        - name: Set correct permissions on Docker keyring
          ansible.builtin.file:
            path: "{{ docker_keyring_path }}"
            mode: "0644"

        - name: Set Docker APT architecture mapping
          ansible.builtin.set_fact:
            docker_apt_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}.get(ansible_architecture, ansible_architecture) }}"

        - name: Add official Docker APT repository
          ansible.builtin.apt_repository:
            repo: >-
              deb [arch={{ docker_apt_arch }} signed-by={{ docker_keyring_path }}]
              https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
            state: present
            filename: "{{ docker_repo_filename }}"

        - name: Install Docker Engine packages
          ansible.builtin.apt:
            name: "{{ docker_packages }}"
            state: present
            update_cache: true
          notify: Restart Docker

        - name: Install Docker SDK for Python on target (for Ansible docker modules)
          ansible.builtin.apt:
            name: python3-docker
            state: present

      rescue:
        # Docker repository setup can occasionally fail (GPG/network hiccups).
        # We do a best-effort retry after a short wait.
        - name: Wait 10 seconds before retrying Docker repository setup
          ansible.builtin.pause:
            seconds: 10

        - name: Retry apt cache update
          ansible.builtin.apt:
            update_cache: true

        - name: Re-download Docker GPG key (force)
          ansible.builtin.get_url:
            url: "{{ docker_gpg_key_url }}"
            dest: /tmp/docker.gpg
            mode: "0644"
            force: true

        - name: Retry converting (dearmor) Docker GPG key
          ansible.builtin.command:
            cmd: "gpg --dearmor -o {{ docker_keyring_path }} /tmp/docker.gpg"
          changed_when: true
          notify: Restart Docker

        - name: Retry adding Docker APT repository
          ansible.builtin.apt_repository:
            repo: >-
              deb [arch={{ docker_apt_arch | default('amd64') }} signed-by={{ docker_keyring_path }}]
              https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
            state: present
            filename: "{{ docker_repo_filename }}"

        - name: Retry installing Docker Engine packages
          ansible.builtin.apt:
            name: "{{ docker_packages }}"
            state: present
            update_cache: true
          notify: Restart Docker

      become: true
      tags:
        - docker_install

    # -----------------------------------------------------------------------
    # Configuration
    # -----------------------------------------------------------------------
    - name: Configure Docker
      block:
        - name: Ensure docker group exists
          ansible.builtin.group:
            name: docker
            state: present

        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ docker_user }}"
            groups: docker
            append: true

      become: true
      tags:
        - docker_config

  always:
    # Lab06 requirement: always ensure Docker service is enabled & started.
    # If Docker is not installed yet, we do not fail the whole play.
    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      become: true
      register: docker_service_result
      failed_when: false
      tags:
        - docker_install
        - docker_config
