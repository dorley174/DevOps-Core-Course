---

# Lab06 Task 3: Safe wipe logic.
# Double-gating:
#   1) web_app_wipe=true
#   2) tag web_app_wipe (for wipe-only runs)

- name: Wipe web application
  block:
    - name: Check if app directory exists
      ansible.builtin.stat:
        path: "{{ compose_project_dir }}"
      register: web_app_dir

    - name: Stop and remove containers (docker compose down)
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: absent
        remove_orphans: true
      when: web_app_dir.stat.exists
      register: web_app_compose_down
      failed_when: false

    - name: Remove docker-compose.yml
      ansible.builtin.file:
        path: "{{ compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: absent

    - name: Remove application image (optional)
      community.docker.docker_image:
        name: "{{ docker_image }}:{{ docker_tag }}"
        state: absent
      when: web_app_wipe_remove_image | bool
      register: web_app_image_remove
      failed_when: false

    - name: Log wipe completion
      ansible.builtin.copy:
        dest: /tmp/ansible_web_app_wipe.log
        content: "web app {{ app_name }} wiped at {{ ansible_date_time.iso8601 }}\n"
        mode: "0644"
      changed_when: false

    - name: Wipe summary
      ansible.builtin.debug:
        msg: "Application {{ app_name }} wiped successfully"

  when: web_app_wipe | bool
  tags:
    - web_app_wipe
